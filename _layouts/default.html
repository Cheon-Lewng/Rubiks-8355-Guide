<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      try {
        const theme = localStorage.getItem("theme");
        if (theme === "light") {
          document.documentElement.classList.add("light-mode");
        }
      } catch (e) { }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>
  <header>

    <h1><a href="{{ '/' | relative_url }}">Rubik’s Guides</a></h1>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>

    <div class="nav-row">
      <nav class="navbar-links" id="navbarLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/cube-basics/' | relative_url }}">Cube Basics</a>
        <a href="{{ '/beginners-method/' | relative_url }}">Beginner’s Method</a>
        <a href="{{ '/next-steps/' | relative_url }}">Next Steps</a>
        <a href="{{ '/cfop/' | relative_url }}">CFOP</a>
      </nav>

      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>

  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>Created with ❤️ by Tensai-kun</p>
  </footer>

  <script>
    const navToggle = document.getElementById("navToggle");
    const navbarLinks = document.getElementById("navbarLinks");
    const themeToggle = document.getElementById("themeToggle");

    // Mobile nav
    navToggle.addEventListener("click", () => {
      navbarLinks.classList.toggle("show");
    });

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
      document.body.classList.add("light-mode");
      themeToggle.textContent = "🌞";
    }

    // Toggle theme
    themeToggle.addEventListener("click", () => {
      const root = document.documentElement;
      root.classList.toggle("light-mode");

      if (root.classList.contains("light-mode")) {
        localStorage.setItem("theme", "light");
        themeToggle.textContent = "🌞";
      } else {
        localStorage.setItem("theme", "dark");
        themeToggle.textContent = "🌙";
      }
    });

    const header = document.querySelector("header");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 80) {
        header.classList.add("shrunk");
      } else {
        header.classList.remove("shrunk");
      }
    });

  </script>
  ``
</body>

</html>
